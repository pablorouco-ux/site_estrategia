<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Showroom Día del Padre | Natura & Avon</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- PapaParse -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    
    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Fuentes de Marca -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            orange: '#FF6B00',
                            orangeHover: '#E66000',
                            light: '#FFF5F0',
                            gray: '#F4F4F4',
                        },
                        avon: {
                            primary: '#E2197C',
                            light: '#FCE7F3'
                        },
                        text: {
                            main: '#1F2937',
                            sec: '#64748B',
                            mut: '#9CA3AF'
                        },
                        ui: {
                            app: '#F8FAFC',
                            card: '#FFFFFF'
                        }
                    },
                    fontFamily: {
                        sans: ['NaturaAndCo', 'Montserrat', 'Inter', 'sans-serif']
                    },
                    boxShadow: {
                        'soft': '0 2px 4px 0 rgba(0, 0, 0, 0.03), 0 1px 2px -1px rgba(0, 0, 0, 0.02)'
                    }
                }
            }
        }
    </script>

    <style>
        @font-face {
            font-family: 'NaturaAndCo';
            src: local('NaturaAndCo'), local('Montserrat');
            font-display: swap;
        }

        /* Estética de Scrollbar para PC */
        ::-webkit-scrollbar { height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #CBD5E1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94A3B8; }

        .animate-fade-in {
            animation: fadeIn 0.3s ease-in-out both;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Snap behavior for horizontal scroll */
        .snap-x { scroll-snap-type: x mandatory; }
        .snap-start { scroll-snap-align: start; }
    </style>
</head>
<body class="bg-ui-app text-text-main font-sans antialiased min-h-screen flex flex-col">

    <!-- Header & Filtros -->
    <header class="bg-white border-b border-gray-100 shadow-soft sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 py-5 flex flex-col md:flex-row justify-between items-start md:items-center gap-5 relative">
            <div class="flex-1 w-full">
                <div class="flex items-center gap-3">
                    <div id="brand-logo-container" class="transition-all duration-300">
                         <!-- Logo placeholder/text -->
                         <span class="text-2xl font-bold tracking-tight text-brand-orange" id="brand-title">Natura</span>
                    </div>
                    <div class="h-6 w-px bg-gray-200"></div>
                    <h1 class="text-xl font-medium text-text-sec">Showroom Día del Padre</h1>
                </div>
                <p class="text-text-sec text-[11px] mt-1.5 flex items-center gap-1.5 font-medium tracking-wider uppercase">
                    <i data-lucide="clock" class="w-3.5 h-3.5 stroke-[2.5]"></i> Actualizado: <span id="last-update" class="text-text-mut whitespace-nowrap">Calculando...</span>
                </p>
            </div>
            
            <div class="w-full md:w-80">
                <label for="gerencia-select" class="block text-[10px] font-bold uppercase tracking-widest text-text-sec mb-1.5 pl-1">
                    Gerencia de Ventas
                </label>
                <div class="relative">
                    <select id="gerencia-select" class="w-full appearance-none bg-brand-gray border border-gray-200 rounded-xl px-4 py-3 text-sm font-semibold text-text-main focus:outline-none focus:border-brand-orange focus:ring-1 focus:ring-brand-orange transition-colors cursor-pointer shadow-none">
                        <option value="">Cargando gerencias...</option>
                    </select>
                    <i data-lucide="chevron-down" class="absolute right-4 top-1/2 -translate-y-1/2 w-4 h-4 text-text-sec pointer-events-none stroke-[2.5]"></i>
                </div>
            </div>
        </div>
        
        <!-- Navigation Tabs -->
        <div class="max-w-7xl mx-auto px-4 sm:px-6 flex gap-8">
            <button onclick="setTab('Natura')" id="tab-natura" class="py-3 px-1 text-sm font-bold uppercase tracking-widest text-brand-orange border-b-[3px] border-brand-orange transition-all duration-300">Natura</button>
            <button onclick="setTab('Avon')" id="tab-avon" class="py-3 px-1 text-sm font-bold uppercase tracking-widest text-text-mut border-b-[3px] border-transparent hover:text-avon-primary transition-all duration-300">Avon</button>
        </div>
    </header>

    <!-- App Main -->
    <main class="flex-1 w-full max-w-7xl mx-auto px-4 sm:px-6 py-8">
        
        <!-- Loading State -->
        <div id="loading" class="flex flex-col justify-center items-center py-20">
            <div id="spinner" class="animate-spin rounded-full h-12 w-12 border-[3px] border-brand-gray border-t-brand-orange"></div>
            <p class="mt-5 text-brand-orange font-bold tracking-widest text-[10px] uppercase animate-pulse">Sincronizando Planes...</p>
        </div>

        <!-- Empty State -->
        <div id="empty-state" class="hidden flex-col justify-center items-center py-24 text-center">
            <div class="bg-white p-6 rounded-3xl shadow-soft border border-gray-100 mb-5">
                <i data-lucide="search-x" class="w-12 h-12 text-text-mut stroke-[1.5]"></i>
            </div>
            <h3 class="text-xl font-bold text-text-main mb-2 tracking-tight">Sin resultados</h3>
            <p class="text-text-sec text-sm leading-relaxed max-w-md">No encontramos productos para esta selección. Prueba cambiando la marca o la gerencia.</p>
        </div>

        <!-- Product Grid -->
        <div id="product-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6 hidden"></div>

    </main>

    <footer class="bg-white border-t border-gray-100 py-8 text-center px-4">
        <p class="text-[10px] font-bold uppercase tracking-[0.3em] text-text-mut">
            &copy; <span id="year"></span> Natura &Co <span class="mx-2 opacity-30">|</span> Bien Estar Bien
        </p>
    </footer>

    <script>
        const SHEET_ID = '1_rLxNuEIP1JBxUJ3MZwse_RVZuu0WA52nNJ_Vp3vH3o';
        
        let db = {
            site: [],
            gerencias: [],
            cuotas: {} // Map: gerenciaId -> { codVenta: quantity }
        };
        
        let state = {
            tab: 'Natura',
            gerenciaId: ''
        };

        async function init() {
            try {
                // Ahora cargamos un único archivo consolidado desde GitHub para evitar bloqueos corporativos
                const response = await fetch('./data.json');
                if (!response.ok) throw new Error('No se encontró el archivo de datos');
                
                const data = await response.json();
                
                db.site = data.site || [];
                db.gerencias = data.gerencias || [];
                db.cuotas = data.cuotas || {};

                updateLastUpdate(data.updatedAt);
                populateGerencias();
                
                document.getElementById('loading').classList.add('hidden');
                render();

            } catch (err) {
                console.error(err);
                Swal.fire({
                    title: 'Sincronización pendiente',
                    text: 'Aún no se han sincronizado los datos desde la planilla original.',
                    icon: 'info',
                    confirmButtonColor: '#FF6B00',
                    customClass: { popup: 'rounded-3xl' }
                });
            }
        }

        // Se eliminan parseGerencias, parseCuotas, parseSite ya que el JSON viene limpio del script

        function populateGerencias() {
            const sel = document.getElementById('gerencia-select');
            sel.innerHTML = '<option value="">Seleccionar Gerencia...</option>';
            db.gerencias.sort((a,b) => a.name.localeCompare(b.name)).forEach(g => {
                const opt = document.createElement('option');
                opt.value = g.id;
                opt.textContent = g.name;
                sel.appendChild(opt);
            });
            sel.onchange = e => { state.gerenciaId = e.target.value; render(); };
        }

        function setTab(t) {
            state.tab = t;
            const isNatura = t === 'Natura';
            
            // UI Updates
            const btnN = document.getElementById('tab-natura');
            const btnA = document.getElementById('tab-avon');
            const title = document.getElementById('brand-title');
            
            if(isNatura) {
                btnN.className = "py-3 px-1 text-sm font-bold uppercase tracking-widest text-brand-orange border-b-[3px] border-brand-orange transition-all duration-300";
                btnA.className = "py-3 px-1 text-sm font-bold uppercase tracking-widest text-text-mut border-b-[3px] border-transparent hover:text-avon-primary transition-all duration-300";
                title.textContent = "Natura";
                title.className = "text-2xl font-bold tracking-tight text-brand-orange";
            } else {
                btnA.className = "py-3 px-1 text-sm font-bold uppercase tracking-widest text-avon-primary border-b-[3px] border-avon-primary transition-all duration-300";
                btnN.className = "py-3 px-1 text-sm font-bold uppercase tracking-widest text-text-mut border-b-[3px] border-transparent hover:text-brand-orange transition-all duration-300";
                title.textContent = "Avon";
                title.className = "text-2xl font-bold tracking-tight text-avon-primary";
            }
            render();
        }

        function getImg(marca, cod, type) {
            const folder = type === 'A' ? marca.trim() : 'Alternativas';
            return `./imagenes/${folder}/${cod}.jpg`;
        }

        function render() {
            const grid = document.getElementById('product-grid');
            const empty = document.getElementById('empty-state');
            grid.innerHTML = '';

            const filtered = db.site.filter(i => i.marca.trim().toLowerCase() === state.tab.trim().toLowerCase());

            if (filtered.length === 0) {
                grid.classList.add('hidden');
                empty.classList.remove('hidden');
                empty.classList.add('flex');
            } else {
                grid.classList.remove('hidden');
                empty.classList.add('hidden');
                empty.classList.remove('flex');

                filtered.forEach((item, idx) => {
                    const card = document.createElement('div');
                    card.className = "animate-fade-in bg-white rounded-2xl border border-gray-100 shadow-soft hover:-translate-y-1 transition-all duration-300 flex flex-col overflow-hidden";
                    card.style.animationDelay = `${idx * 0.05}s`;

                    const carousel = document.createElement('div');
                    carousel.className = "flex overflow-x-auto snap-x";
                    
                    item.plans.forEach(plan => {
                        const slide = document.createElement('div');
                        slide.className = "min-w-full snap-start p-5 flex flex-col";
                        
                        const isMain = plan.type === 'A';
                        const badgeColor = isMain ? (state.tab === 'Natura' ? 'bg-brand-orange' : 'bg-avon-primary') : 'bg-gray-800';
                        
                        let quotaText = "Consultar gerencia";
                        let quotaClass = "text-text-mut";
                        if (state.gerenciaId) {
                            const stock = db.cuotas[state.gerenciaId]?.[plan.cod];
                            if (stock !== undefined) {
                                quotaText = stock > 0 ? `Disponibles: ${stock} unidades` : "No disponible";
                                quotaClass = stock > 0 ? (state.tab === 'Natura' ? 'text-brand-orange font-bold' : 'text-avon-primary font-bold') : "text-[#B91C1C] font-extrabold";
                            } else {
                                quotaText = "Sin límite";
                                quotaClass = "text-green-600 font-bold";
                            }
                        }

                        slide.innerHTML = `
                            <div class="relative mb-4">
                                <span class="absolute top-2 left-2 z-10 ${badgeColor} text-white text-[9px] font-bold px-3 py-1.5 rounded-lg uppercase tracking-widest shadow-sm">
                                    ${isMain ? 'Original' : 'Alternativa ' + plan.type}
                                </span>
                                <div class="aspect-square bg-brand-gray rounded-xl flex items-center justify-center p-6 border border-gray-50">
                                    <img src="${getImg(item.marca, plan.cod, plan.type)}" 
                                         onerror="this.src='https://placehold.co/400x400/F4F4F4/9CA3AF?text=Próximamente'" 
                                         class="max-w-full max-h-full object-contain mix-blend-multiply">
                                </div>
                            </div>
                            <div class="flex-1 flex flex-col">
                                <span class="text-[10px] text-text-mut font-bold tracking-widest uppercase mb-1">Cód: ${plan.cod}</span>
                                <h4 class="text-sm font-bold text-text-main leading-tight mb-4 flex-1 line-clamp-2">${plan.desc}</h4>
                                <div class="pt-4 border-t border-gray-50 flex items-center justify-between">
                                    <span class="text-[11px] uppercase tracking-wider ${quotaClass}">${quotaText}</span>
                                </div>
                            </div>
                        `;
                        carousel.appendChild(slide);
                    });

                    card.appendChild(carousel);
                    if (item.plans.length > 1) {
                        const info = document.createElement('div');
                        info.className = "px-5 pb-4 text-[9px] font-bold uppercase tracking-[0.2em] text-text-mut flex items-center gap-2";
                        info.innerHTML = `<i data-lucide="arrow-left-right" class="w-3"></i> Desliza para ver alternativas`;
                        card.appendChild(info);
                    }
                    grid.appendChild(card);
                });
            }
            lucide.createIcons();
            document.getElementById('year').textContent = new Date().getFullYear();
        }

        function updateLastUpdate(isoDate) {
            const d = isoDate ? new Date(isoDate) : new Date();
            const fmt = `${d.getDate()}/${d.getMonth() + 1}/${d.getFullYear()} ${d.getHours().toString().padStart(2, '0')}:${d.getMinutes().toString().padStart(2, '0')}`;
            document.getElementById('last-update').textContent = fmt;
        }

        window.onload = init;
    </script>
</body>
</html>
